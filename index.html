<!doctype html>
<html class="no-js" lang="">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>Logan Daniels</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <style>

        html, body {
            height: 80%;
            width: 100%;
            margin: 0;
            font-size: 20px;
        }

        .flex-container {
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flexrow {
          display: flex;
          flex-direction: row;
        }

        .flexcol {
          width: 100%;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
        }
        
        .header {
            font-size: 30px;
            align-items: center;
            text-align: center;
        }

        #a, #aniels {
            visibility: none;
            opacity: 0;
            font-size: 0;
            transition: all 1s;
        }

        #a.show, #aniels.show, .photo.show {
            visibility: visible;;
            opacity: 1;
            font-size: 30px;
        }

        #animated {
            position: relative;
            top: 0px;
            left: 0px;
        }

        #nav {
            width: 80%;
            max-width: 375px;
            margin-top: 30px;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        .navItem {
            color: gray;
            display: inline;
            width: 70px;
            padding-left: 5px;
            padding-right: 5px;
            border-left: 1px solid lightgray;
            border-right: 1px solid lightgray;
        }

        .navItem:hover {
            border-left: 1px solid gray;
            border-right: 1px solid gray;
            font-weight: bold;
            color: black;
            cursor: pointer;
        }

        a {
            color: inherit;
            text-decoration: inherit;
        }

        .photo-container {
            display: flex;
            justify-content: center;
        }

        .photo {
            max-width: 200px;
            max-height: 200px;
            height: auto;
            width: auto;
            border-radius: 50%;
            opacity: 0;
            transition: .7s all;
        }
        </style>
    </head>
    <body>
    <div class="flex-container">
        <div class="flexcol">
            <div class="photo-container">
                <img src="profile.jpg" class="photo">
            </div>
            <div class="header">
                <div id="animated">
                    L<span id="og">og</span><span id="a">a</span><span id="n">n </span>D<span id="aniels">aniels</span>
                </div>
            </div>

            <div id="nav" class="flexrow">
                <div class="navItem"><a href="http://blog.lognd.com" target="_blank">words</a></div>
                <div class="navItem"><a href="https://youtube.com/logiedan" target="_blank">video</a></div>
                <div class="navItem">
                    <a href="https://github.com/logandaniels" target="_blank">
                        code
                    </a>
                </div>
                <div class="navItem"><a href="mailto:logan@lognd.com" target="_blank">contact</a></div>
            </div>

        </div>
    </div>


        <script src="https://code.jquery.com/jquery-3.2.0.min.js" integrity="sha256-JAW99MJVpJBGcbzEuXk4Az05s/XyDdBomFqNlM3ic+I=" crossorigin="anonymous"></script>
        <script>window.jQuery || document.write('<script src="js/vendor/jquery-3.2.0.min.js"><\/script>')</script>
        <script>
        $(document).ready( function() {
            setTimeout(function() {
                $('#a').addClass('show');
                $('#aniels').addClass('show');
                setTimeout(function() {
                    $('.photo').addClass('show');
                }, 500);
            }, 200);
        });
        </script>
    </body>
</html>
