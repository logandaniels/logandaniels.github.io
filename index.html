        <style>

        html, body {
            height: 80%;
            font-size: 20px;
        }

        .flex-container {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flexrow {
          display: flex;

        }

        #animated {

            left: 0px;
        }

        #nav {
            width: 50%;

            border-right: 1px solid lightgray;
            transition: all .5s;
        }

        .navItem:hover {
            border-left: 1px solid gray;
            border-right: 1px solid gray;
            font-weight: bold;
            color: black;
            cursor: pointer;
        }

        a { color: inherit;
